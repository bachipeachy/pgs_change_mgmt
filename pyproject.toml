[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pgs-change-mgmt"
version = "0.5.0"
description = "PGS Change Management — Governed SDLC pipeline from Change Request to Authoring Plan for Protocol-Governed Systems"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"

authors = [
  { name = "Bhash Ganti aka Bachi" }
]

keywords = [
  "protocol-governed-systems",
  "pgs",
  "change-management",
  "governed-sdlc",
  "spec-driven-design",
  "governance-specification"
]

classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
  "Topic :: Software Development",
  "Topic :: System :: Distributed Computing"
]

dependencies = []

[project.urls]
Homepage = "https://github.com/bachipeachy/pgs_change_mgmt"
Repository = "https://github.com/bachipeachy/pgs_change_mgmt"

[tool.setuptools.packages.find]
include = ["pgs_change_mgmt*"]

[tool.setuptools]
include-package-data = true
